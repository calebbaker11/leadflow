<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 178 40" fill="none">
  <!-- Bar 1 (short) -->
  <rect x="0" y="22" width="8" height="16" rx="2" fill="#6366f1"/>
  <!-- Bar 2 (medium) -->
  <rect x="12" y="13" width="8" height="25" rx="2" fill="#6366f1"/>
  <!-- Bar 3 (tall) -->
  <rect x="24" y="4" width="8" height="34" rx="2" fill="#6366f1"/>
  <!-- Arrow: diagonal shaft from bar 3 top going up-right -->
  <line x1="28" y1="6" x2="38" y2="0" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polyline points="31,0 38,0 38,7" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Swoosh arc at bottom -->
  <path d="M0 38 Q16 33 32 38" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- LeadFlow text -->
  <text x="50" y="30" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#4f46e5" letter-spacing="-0.5">LeadFlow</text>
</svg>

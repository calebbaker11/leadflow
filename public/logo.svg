<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 36" fill="none">
  <!-- Bar 1 (short) -->
  <rect x="0" y="20" width="7" height="14" rx="1.5" fill="#6366f1"/>
  <!-- Bar 2 (medium) -->
  <rect x="11" y="12" width="7" height="22" rx="1.5" fill="#6366f1"/>
  <!-- Bar 3 (tall) -->
  <rect x="22" y="4" width="7" height="30" rx="1.5" fill="#6366f1"/>
  <!-- Arrow: diagonal shaft from bar 3 top going up-right -->
  <line x1="26" y1="6" x2="34" y2="0" stroke="#6366f1" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polyline points="28,0 34,0 34,6" stroke="#6366f1" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Swoosh arc at bottom -->
  <path d="M0 34 Q15 30 29 34" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- LeadFlow text -->
  <text x="46" y="27" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#6366f1" letter-spacing="-0.5">LeadFlow</text>
</svg>

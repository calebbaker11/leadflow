<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 535 148" fill="none">
  <!--
    Icon: 3 stacked L-shaped pages, fanning clockwise from bottom-left pivot.
    Back page (darkest) → front page (lightest with stroke).
  -->

  <!-- Back page -->
  <path
    d="M22 132 L22 16 Q22 6 32 6 L80 6 Q91 6 90 17 L78 82 L108 82 L108 132 Z"
    fill="#3c2d8e"
    transform="rotate(14, 22, 132)"
  />

  <!-- Middle page -->
  <path
    d="M22 132 L22 16 Q22 6 32 6 L80 6 Q91 6 90 17 L78 82 L108 82 L108 132 Z"
    fill="#6045c0"
    transform="rotate(7, 22, 132)"
  />

  <!-- Front page -->
  <path
    d="M22 132 L22 16 Q22 6 32 6 L80 6 Q91 6 90 17 L78 82 L108 82 L108 132 Z"
    fill="#9375e8"
    stroke="#c4b0f8"
    stroke-width="3.5"
    stroke-linejoin="round"
  />

  <!-- LeadFlow wordmark -->
  <text
    x="132"
    y="104"
    font-family="Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
    font-size="64"
    font-weight="800"
    fill="white"
    letter-spacing="-0.5"
  >LeadFlow</text>
</svg>
